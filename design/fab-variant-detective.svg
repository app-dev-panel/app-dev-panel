<svg xmlns="http://www.w3.org/2000/svg" width="280" height="300" viewBox="0 0 280 300">
  <style>text { font-family: 'Segoe UI', Arial, sans-serif; }</style>
  <rect width="280" height="300" fill="#F8FAFC" rx="12"/>
  <text x="140" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">Duck Detective (magnifier)</text>

  <!-- Large Fab 112px -->
  <circle cx="140" cy="140" r="56" fill="#2563EB"/>
  <g transform="translate(98, 100) scale(0.58)">
    <!-- Body -->
    <ellipse cx="70" cy="82" rx="42" ry="30" fill="#FCD34D"/>
    <!-- Head -->
    <circle cx="44" cy="44" r="24" fill="#FCD34D"/>
    <!-- Beak -->
    <path d="M24 40L10 44L24 48Z" fill="#FB923C"/>
    <!-- Eye -->
    <circle cx="38" cy="38" r="3.5" fill="#292524"/>
    <circle cx="37" cy="37" r="1.2" fill="white"/>
    <!-- Wing accent -->
    <path d="M56 74C64 66 82 68 94 78" stroke="#FBBF24" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Magnifying glass handle -->
    <line x1="105" y1="60" x2="122" y2="80" stroke="#78716C" stroke-width="4" stroke-linecap="round"/>
    <!-- Magnifying glass ring -->
    <circle cx="97" cy="48" r="16" fill="none" stroke="#78716C" stroke-width="3.5"/>
    <!-- Glass reflection -->
    <circle cx="97" cy="48" r="14" fill="#BFDBFE" opacity="0.3"/>
    <path d="M88 40 Q92 36 98 38" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  </g>

  <!-- Small 40px -->
  <circle cx="80" cy="260" r="20" fill="#2563EB"/>
  <g transform="translate(62, 242) scale(0.25)">
    <ellipse cx="70" cy="82" rx="42" ry="30" fill="#FCD34D"/>
    <circle cx="44" cy="44" r="24" fill="#FCD34D"/>
    <path d="M24 40L10 44L24 48Z" fill="#FB923C"/>
    <circle cx="38" cy="38" r="3.5" fill="#292524"/>
    <circle cx="37" cy="37" r="1.2" fill="white"/>
    <line x1="105" y1="60" x2="122" y2="80" stroke="#78716C" stroke-width="4" stroke-linecap="round"/>
    <circle cx="97" cy="48" r="16" fill="none" stroke="#78716C" stroke-width="3.5"/>
    <circle cx="97" cy="48" r="14" fill="#BFDBFE" opacity="0.3"/>
  </g>
  <text x="108" y="264" font-size="11" fill="#64748B">40px</text>

  <!-- Small 28px -->
  <circle cx="170" cy="260" r="14" fill="#2563EB"/>
  <g transform="translate(156, 248) scale(0.18)">
    <ellipse cx="70" cy="82" rx="42" ry="30" fill="#FCD34D"/>
    <circle cx="44" cy="44" r="24" fill="#FCD34D"/>
    <path d="M24 40L10 44L24 48Z" fill="#FB923C"/>
    <circle cx="38" cy="38" r="3.5" fill="#292524"/>
    <line x1="105" y1="60" x2="122" y2="80" stroke="#78716C" stroke-width="4" stroke-linecap="round"/>
    <circle cx="97" cy="48" r="16" fill="none" stroke="#78716C" stroke-width="3.5"/>
    <circle cx="97" cy="48" r="14" fill="#BFDBFE" opacity="0.3"/>
  </g>
  <text x="192" y="264" font-size="11" fill="#64748B">28px</text>
</svg>
