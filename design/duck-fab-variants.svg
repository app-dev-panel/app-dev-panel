<svg xmlns="http://www.w3.org/2000/svg" width="900" height="350" viewBox="0 0 900 350">
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>

  <!-- Background -->
  <rect width="900" height="350" fill="#F8FAFC" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1E293B">Duck Icon — Floating Button Variants</text>

  <!-- ===== Variant A: Minimal duck.svg ===== -->
  <g transform="translate(50, 60)">
    <text x="100" y="16" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">A — Minimal</text>

    <!-- Fab circle preview -->
    <circle cx="100" cy="145" r="56" fill="#2563EB" />
    <g transform="translate(62, 107) scale(0.6)">
      <ellipse cx="70" cy="82" rx="42" ry="30" fill="#FCD34D"/>
      <circle cx="44" cy="44" r="24" fill="#FCD34D"/>
      <path d="M24 40L10 44L24 48Z" fill="#FB923C"/>
      <circle cx="38" cy="38" r="3.5" fill="#292524"/>
      <circle cx="37" cy="37" r="1.2" fill="white"/>
      <path d="M56 74C64 66 82 68 94 78" stroke="#FBBF24" stroke-width="3" stroke-linecap="round" fill="none"/>
      <path d="M16 108C24 104 32 104 40 108C48 112 56 112 64 108C72 104 80 104 88 108C96 112 104 112 112 108" stroke="#93C5FD" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    </g>

    <!-- Small size preview -->
    <circle cx="30" cy="260" r="20" fill="#2563EB"/>
    <g transform="translate(14, 244) scale(0.25)">
      <ellipse cx="70" cy="82" rx="42" ry="30" fill="#FCD34D"/>
      <circle cx="44" cy="44" r="24" fill="#FCD34D"/>
      <path d="M24 40L10 44L24 48Z" fill="#FB923C"/>
      <circle cx="38" cy="38" r="3.5" fill="#292524"/>
      <circle cx="37" cy="37" r="1.2" fill="white"/>
      <path d="M56 74C64 66 82 68 94 78" stroke="#FBBF24" stroke-width="3" stroke-linecap="round" fill="none"/>
    </g>
    <text x="58" y="264" font-size="11" fill="#64748B">40px</text>

    <circle cx="30" cy="300" r="14" fill="#2563EB"/>
    <g transform="translate(18, 290) scale(0.18)">
      <ellipse cx="70" cy="82" rx="42" ry="30" fill="#FCD34D"/>
      <circle cx="44" cy="44" r="24" fill="#FCD34D"/>
      <path d="M24 40L10 44L24 48Z" fill="#FB923C"/>
      <circle cx="38" cy="38" r="3.5" fill="#292524"/>
    </g>
    <text x="52" y="304" font-size="11" fill="#64748B">28px</text>
  </g>

  <!-- ===== Variant B: Detailed duck-detailed.svg ===== -->
  <g transform="translate(310, 60)">
    <text x="100" y="16" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">B — Detailed (goggles + badge)</text>

