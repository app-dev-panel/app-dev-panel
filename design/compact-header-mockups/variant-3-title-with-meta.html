<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Variant 3 — Title + meta in one row</title>
    <style>
      :root {
        --bg: #f4f5f7;
        --surface: #ffffff;
        --border: #e5e7eb;
        --text: #111827;
        --muted: #6b7280;
        --accent: #2563eb;
        --chip: #f3f4f6;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: var(--bg);
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: var(--text);
      }
      .container {
        max-width: 980px;
        margin: 0 auto;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }

      /* === Variant 3: Title + meta stats on one row === */
      /* Title on the left, page metadata (count / primary stats) right-aligned.
         The description line is absorbed into a tooltip on the icon.
         Vertical space ~48px. */
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 20px;
        border-bottom: 1px solid var(--border);
      }
      .title {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 15px;
        font-weight: 600;
      }
      .title .icon {
        width: 18px;
        height: 18px;
        color: var(--accent);
      }
      .title .info {
        color: var(--muted);
        font-weight: 400;
        cursor: help;
      }

      .meta {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 3px 10px;
        border-radius: 999px;
        background: var(--chip);
        color: var(--muted);
        font-size: 12px;
      }
      .chip strong {
        color: var(--text);
        font-weight: 600;
      }
      .chip.get strong {
        color: #16a34a;
      }
      .chip.post strong {
        color: var(--accent);
      }

      .content {
        padding: 20px;
      }
      .stub {
        height: 48px;
        background: #f9fafb;
        border: 1px dashed var(--border);
        border-radius: 8px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <span class="title">
          <svg
            class="icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="6" cy="19" r="2" />
            <circle cx="18" cy="5" r="2" />
            <path d="M8 19h8a4 4 0 0 0 4-4V9" />
            <path d="M16 5H8a4 4 0 0 0-4 4v6" />
          </svg>
          Routes
          <span class="info" title="View and check application routes">ⓘ</span>
        </span>

        <div class="meta">
          <span class="chip"><strong>47</strong> total</span>
          <span class="chip get"><strong>42</strong> GET</span>
          <span class="chip post"><strong>5</strong> POST</span>
        </div>
      </header>

      <main class="content">
        <div class="stub">check route input</div>
        <div class="stub">filter routes</div>
        <div class="stub">route list</div>
        <div class="stub">route list</div>
        <div class="stub">route list</div>
      </main>
    </div>
  </body>
</html>
