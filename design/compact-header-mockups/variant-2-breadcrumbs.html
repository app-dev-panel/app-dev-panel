<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Variant 2 — Breadcrumbs only</title>
    <style>
      :root {
        --bg: #f4f5f7;
        --surface: #ffffff;
        --border: #e5e7eb;
        --text: #111827;
        --muted: #6b7280;
        --accent: #2563eb;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: var(--bg);
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: var(--text);
      }
      .container {
        max-width: 980px;
        margin: 0 auto;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }

      /* === Variant 2: Breadcrumb trail === */
      /* The whole header becomes a breadcrumb path with the current page emphasized.
         Description is removed — the section title in the sidebar carries it.
         Vertical space ~36px. */
      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
      }
      .crumb {
        color: var(--muted);
        text-decoration: none;
      }
      .sep {
        color: #d1d5db;
        font-size: 12px;
      }
      .current {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--text);
        font-weight: 600;
        font-size: 14px;
      }
      .current svg {
        width: 14px;
        height: 14px;
        color: var(--accent);
      }
      .help {
        margin-left: auto;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 1px solid var(--border);
        color: var(--muted);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        cursor: help;
      }

      .content {
        padding: 20px;
      }
      .stub {
        height: 48px;
        background: #f9fafb;
        border: 1px dashed var(--border);
        border-radius: 8px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <a class="crumb" href="#">Inspector</a>
        <span class="sep">›</span>
        <span class="current">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="6" cy="19" r="2" />
            <circle cx="18" cy="5" r="2" />
            <path d="M8 19h8a4 4 0 0 0 4-4V9" />
            <path d="M16 5H8a4 4 0 0 0-4 4v6" />
          </svg>
          Routes
        </span>
        <span class="help" title="View and check application routes">?</span>
      </header>

      <main class="content">
        <div class="stub">check route input</div>
        <div class="stub">method filters</div>
        <div class="stub">route list</div>
        <div class="stub">route list</div>
        <div class="stub">route list</div>
      </main>
    </div>
  </body>
</html>
