<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Variant 4 — Header merged with primary action</title>
    <style>
      :root {
        --bg: #f4f5f7;
        --surface: #ffffff;
        --border: #e5e7eb;
        --text: #111827;
        --muted: #6b7280;
        --accent: #2563eb;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: var(--bg);
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: var(--text);
      }
      .container {
        max-width: 980px;
        margin: 0 auto;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }

      /* === Variant 4: Header merged with the primary action === */
      /* The page's hero input (check route) is the header itself.
         Title sits as a leading label, the description becomes the placeholder.
         No separate subtitle row, no duplication. Vertical space ~56px. */
      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
      }
      .label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        padding-right: 12px;
        border-right: 1px solid var(--border);
      }
      .label svg {
        width: 16px;
        height: 16px;
        color: var(--accent);
      }
      .label .count {
        color: var(--muted);
        font-weight: 500;
        font-size: 12px;
      }
      .search {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .search input {
        flex: 1;
        border: none;
        outline: none;
        font-size: 13px;
        color: var(--text);
        background: transparent;
        padding: 6px 0;
      }
      .search input::placeholder {
        color: var(--muted);
      }
      .search .search-icon {
        width: 14px;
        height: 14px;
        color: var(--muted);
      }
      .check-btn {
        border: 1px solid var(--border);
        background: #f9fafb;
        color: var(--muted);
        font-size: 12px;
        padding: 4px 10px;
        border-radius: 6px;
        cursor: pointer;
      }

      .content {
        padding: 20px;
      }
      .stub {
        height: 48px;
        background: #f9fafb;
        border: 1px dashed var(--border);
        border-radius: 8px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <span class="label">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="6" cy="19" r="2" />
            <circle cx="18" cy="5" r="2" />
            <path d="M8 19h8a4 4 0 0 0 4-4V9" />
            <path d="M16 5H8a4 4 0 0 0-4 4v6" />
          </svg>
          Routes
          <span class="count">47</span>
        </span>

        <label class="search">
          <svg
            class="search-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="7" />
            <path d="m21 21-4.3-4.3" />
          </svg>
          <input
            type="text"
            placeholder="Check or filter routes — /site/index, POST /auth/login, DELETE /user/1"
          />
          <button class="check-btn">Check</button>
        </label>
      </header>

      <main class="content">
        <div class="stub">method filter tabs (GET 42 / POST 5)</div>
        <div class="stub">route list</div>
        <div class="stub">route list</div>
        <div class="stub">route list</div>
        <div class="stub">route list</div>
      </main>
    </div>
  </body>
</html>
