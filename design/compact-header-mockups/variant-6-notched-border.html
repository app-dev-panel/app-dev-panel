<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Variant 6 — Notched border label</title>
    <style>
      :root {
        --bg: #f4f5f7;
        --surface: #ffffff;
        --border: #e5e7eb;
        --text: #111827;
        --muted: #6b7280;
        --accent: #2563eb;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 48px 32px;
        background: var(--bg);
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: var(--text);
      }

      /* === Variant 6: Notched border label (MUI-style outlined input) === */
      /* The page title sits inside a "notch" on the top border of the
         container, the way a Material / MUI outlined text field floats
         its label. This removes the header row entirely — the page
         identity lives in the frame itself, saving ~88px of vertical
         space and making the whole container feel like one labeled
         region. */
      .container {
        position: relative;
        max-width: 980px;
        margin: 0 auto;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px 20px 20px;
      }

      /* The label that sits on the border. It uses a solid background
         matching the page to visually "cut" the border line underneath. */
      .page-label {
        position: absolute;
        top: 0;
        left: 20px;
        transform: translateY(-50%);
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 0 8px;
        background: var(--bg);
        color: var(--text);
        font-size: 13px;
        font-weight: 600;
        line-height: 1;
        white-space: nowrap;
      }
      .page-label svg {
        width: 14px;
        height: 14px;
        color: var(--accent);
      }
      .page-label .desc {
        color: var(--muted);
        font-weight: 400;
      }
      .page-label .sep {
        color: var(--border);
      }

      .stub {
        height: 48px;
        background: #f9fafb;
        border: 1px dashed var(--border);
        border-radius: 8px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-size: 13px;
      }
      .stub:last-child {
        margin-bottom: 0;
      }

      /* --- Second demo: filled variant, label sits in a flat band at the top --- */
      .container.filled {
        margin-top: 48px;
        background: var(--surface);
        padding-top: 28px;
      }
      .container.filled .page-label {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 4px 12px;
      }
    </style>
  </head>
  <body>
    <!-- Outlined: label cuts through the top border like an MUI outlined input. -->
    <section class="container">
      <span class="page-label">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="6" cy="19" r="2" />
          <circle cx="18" cy="5" r="2" />
          <path d="M8 19h8a4 4 0 0 0 4-4V9" />
          <path d="M16 5H8a4 4 0 0 0-4 4v6" />
        </svg>
        Routes
        <span class="sep">·</span>
        <span class="desc">View and check application routes</span>
      </span>

      <div class="stub">check route input</div>
      <div class="stub">method filters</div>
      <div class="stub">route list</div>
      <div class="stub">route list</div>
      <div class="stub">route list</div>
    </section>

    <!-- Chip variant: same idea but the label is a full pill floating on the edge. -->
    <section class="container filled">
      <span class="page-label">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="6" cy="19" r="2" />
          <circle cx="18" cy="5" r="2" />
          <path d="M8 19h8a4 4 0 0 0 4-4V9" />
          <path d="M16 5H8a4 4 0 0 0-4 4v6" />
        </svg>
        Routes
      </span>

      <div class="stub">check route input</div>
      <div class="stub">method filters</div>
      <div class="stub">route list</div>
      <div class="stub">route list</div>
      <div class="stub">route list</div>
    </section>
  </body>
</html>
