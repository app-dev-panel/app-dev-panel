<svg xmlns="http://www.w3.org/2000/svg" width="280" height="300" viewBox="0 0 280 300">
  <style>text { font-family: 'Segoe UI', Arial, sans-serif; }</style>
  <rect width="280" height="300" fill="#F8FAFC" rx="12"/>
  <text x="140" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">Duck Superhero (cape + mask)</text>

  <!-- Large Fab 112px -->
  <circle cx="140" cy="140" r="56" fill="#2563EB"/>
  <g transform="translate(94, 96) scale(0.58)">
    <!-- Body -->
    <ellipse cx="65" cy="82" rx="42" ry="30" fill="#FCD34D"/>
    <!-- Wing accent -->
    <path d="M52 74C60 66 78 68 90 78" stroke="#FBBF24" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Cape — ON TOP of body, draping from back of neck down -->
    <path d="M56 52 C65 48 80 48 88 55 Q100 70 108 95 Q112 110 106 128 Q95 135 78 130 Q65 125 60 115 Q65 100 68 85 Q66 68 56 52Z" fill="#DC2626"/>
    <path d="M68 58 Q78 55 85 62 Q90 75 88 92 Q82 85 78 75 Q74 65 68 58Z" fill="#EF4444" opacity="0.5"/>
    <!-- Head (on top of cape) -->
    <circle cx="40" cy="44" r="24" fill="#FCD34D"/>
    <!-- Beak -->
    <path d="M20 40L6 44L20 48Z" fill="#FB923C"/>
    <!-- Mask -->
    <path d="M20 34 Q30 28 50 30 Q56 31 60 36 L58 42 Q50 37 40 37 Q30 37 22 42Z" fill="#1E293B"/>
    <!-- Eye hole -->
    <ellipse cx="34" cy="38" rx="5.5" ry="4.5" fill="#FCD34D"/>
    <!-- Eye -->
    <circle cx="34" cy="38" r="3.5" fill="#292524"/>
    <circle cx="33" cy="37" r="1.2" fill="white"/>
    <!-- Lightning bolt on chest -->
    <polygon points="50,70 57,70 53,78 61,78 49,92 52,82 45,82" fill="#FACC15"/>
  </g>

  <!-- Small 40px -->
  <circle cx="80" cy="260" r="20" fill="#2563EB"/>
  <g transform="translate(60, 240) scale(0.25)">
    <ellipse cx="65" cy="82" rx="42" ry="30" fill="#FCD34D"/>
    <path d="M56 52 C65 48 80 48 88 55 Q100 70 108 95 Q112 110 106 128 Q95 135 78 130 Q65 125 60 115 Q65 100 68 85 Q66 68 56 52Z" fill="#DC2626"/>
    <circle cx="40" cy="44" r="24" fill="#FCD34D"/>
    <path d="M20 40L6 44L20 48Z" fill="#FB923C"/>
    <path d="M20 34 Q30 28 50 30 Q56 31 60 36 L58 42 Q50 37 40 37 Q30 37 22 42Z" fill="#1E293B"/>
    <ellipse cx="34" cy="38" rx="5.5" ry="4.5" fill="#FCD34D"/>
    <circle cx="34" cy="38" r="3.5" fill="#292524"/>
    <circle cx="33" cy="37" r="1.2" fill="white"/>
    <polygon points="50,70 57,70 53,78 61,78 49,92 52,82 45,82" fill="#FACC15"/>
  </g>
  <text x="108" y="264" font-size="11" fill="#64748B">40px</text>

  <!-- Small 28px -->
  <circle cx="170" cy="260" r="14" fill="#2563EB"/>
  <g transform="translate(154, 246) scale(0.18)">
    <ellipse cx="65" cy="82" rx="42" ry="30" fill="#FCD34D"/>
    <path d="M56 52 C65 48 80 48 88 55 Q100 70 108 95 Q112 110 106 128 Q95 135 78 130 Q65 125 60 115 Q65 100 68 85 Q66 68 56 52Z" fill="#DC2626"/>
    <circle cx="40" cy="44" r="24" fill="#FCD34D"/>
    <path d="M20 40L6 44L20 48Z" fill="#FB923C"/>
    <path d="M20 34 Q30 28 50 30 Q56 31 60 36 L58 42 Q50 37 40 37 Q30 37 22 42Z" fill="#1E293B"/>
    <ellipse cx="34" cy="38" rx="5.5" ry="4.5" fill="#FCD34D"/>
    <circle cx="34" cy="38" r="3.5" fill="#292524"/>
    <polygon points="50,70 57,70 53,78 61,78 49,92 52,82 45,82" fill="#FACC15"/>
  </g>
  <text x="192" y="264" font-size="11" fill="#64748B">28px</text>
</svg>
