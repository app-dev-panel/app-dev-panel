<svg xmlns="http://www.w3.org/2000/svg" width="280" height="300" viewBox="0 0 280 300">
  <style>text { font-family: 'Segoe UI', Arial, sans-serif; }</style>
  <rect width="280" height="300" fill="#F8FAFC" rx="12"/>
  <text x="140" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">Outlined + Superhero</text>

  <!-- Large Fab 112px -->
  <circle cx="140" cy="140" r="56" fill="white"/>
  <circle cx="140" cy="140" r="53.5" fill="none" stroke="#2563EB" stroke-width="3"/>
  <g transform="translate(100, 102) scale(0.56)">
    <!-- Cape — peeking behind at bottom -->
    <path d="M30 75 Q10 95 5 120 L35 110 Z" fill="#DC2626" opacity="0.9"/>
    <path d="M100 75 Q120 95 128 120 L95 110 Z" fill="#EF4444" opacity="0.9"/>
    <!-- Body -->
    <ellipse cx="70" cy="82" rx="42" ry="30" fill="#FCD34D"/>
    <!-- Head -->
    <circle cx="44" cy="44" r="24" fill="#FCD34D"/>
    <!-- Beak -->
    <path d="M24 40L10 44L24 48Z" fill="#FB923C"/>
    <!-- Mask -->
    <path d="M24 34 Q34 28 54 30 Q60 31 64 36 L62 42 Q54 37 44 37 Q34 37 26 42Z" fill="#1E293B"/>
    <!-- Eye hole -->
    <ellipse cx="38" cy="38" rx="5.5" ry="4.5" fill="#FCD34D"/>
    <!-- Eye -->
    <circle cx="38" cy="38" r="3.5" fill="#292524"/>
    <circle cx="37" cy="37" r="1.2" fill="white"/>
    <!-- Wing accent -->
    <path d="M56 74C64 66 82 68 94 78" stroke="#FBBF24" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Lightning bolt on chest -->
    <polygon points="63,68 70,68 66,76 74,76 62,90 65,80 58,80" fill="#FACC15"/>
  </g>

  <!-- Small 40px -->
  <circle cx="80" cy="260" r="20" fill="white"/>
  <circle cx="80" cy="260" r="18" fill="none" stroke="#2563EB" stroke-width="2.5"/>
  <g transform="translate(63, 243) scale(0.24)">
    <path d="M30 75 Q10 95 5 120 L35 110 Z" fill="#DC2626" opacity="0.9"/>
    <path d="M100 75 Q120 95 128 120 L95 110 Z" fill="#EF4444" opacity="0.9"/>
    <ellipse cx="70" cy="82" rx="42" ry="30" fill="#FCD34D"/>
    <circle cx="44" cy="44" r="24" fill="#FCD34D"/>
    <path d="M24 40L10 44L24 48Z" fill="#FB923C"/>
    <path d="M24 34 Q34 28 54 30 Q60 31 64 36 L62 42 Q54 37 44 37 Q34 37 26 42Z" fill="#1E293B"/>
    <ellipse cx="38" cy="38" rx="5.5" ry="4.5" fill="#FCD34D"/>
    <circle cx="38" cy="38" r="3.5" fill="#292524"/>
    <circle cx="37" cy="37" r="1.2" fill="white"/>
    <polygon points="63,68 70,68 66,76 74,76 62,90 65,80 58,80" fill="#FACC15"/>
  </g>
  <text x="108" y="264" font-size="11" fill="#64748B">40px</text>

  <!-- Small 28px -->
  <circle cx="170" cy="260" r="14" fill="white"/>
  <circle cx="170" cy="260" r="12.5" fill="none" stroke="#2563EB" stroke-width="2"/>
  <g transform="translate(157, 249) scale(0.17)">
    <path d="M30 75 Q10 95 5 120 L35 110 Z" fill="#DC2626" opacity="0.9"/>
    <path d="M100 75 Q120 95 128 120 L95 110 Z" fill="#EF4444" opacity="0.9"/>
    <ellipse cx="70" cy="82" rx="42" ry="30" fill="#FCD34D"/>
    <circle cx="44" cy="44" r="24" fill="#FCD34D"/>
    <path d="M24 40L10 44L24 48Z" fill="#FB923C"/>
    <path d="M24 34 Q34 28 54 30 Q60 31 64 36 L62 42 Q54 37 44 37 Q34 37 26 42Z" fill="#1E293B"/>
    <ellipse cx="38" cy="38" rx="5.5" ry="4.5" fill="#FCD34D"/>
    <circle cx="38" cy="38" r="3.5" fill="#292524"/>
    <polygon points="63,68 70,68 66,76 74,76 62,90 65,80 58,80" fill="#FACC15"/>
  </g>
  <text x="192" y="264" font-size="11" fill="#64748B">28px</text>
</svg>
