[source]
paths = [
    "libs/Kernel/src",
    "libs/Kernel/tests",
    "libs/API/src",
    "libs/API/tests",
    "libs/Cli/src",
    "libs/Cli/tests",
    "libs/Adapter/Yiisoft/src",
    "libs/Adapter/Symfony/src",
    "libs/Adapter/Symfony/tests",
    "libs/Adapter/Yii2/src",
    "libs/Adapter/Yii2/tests",
    "libs/Adapter/Laravel/src",
    "libs/Adapter/Laravel/tests",
    "libs/Adapter/Cycle/src",
    "libs/Testing/src",
    "libs/Testing/tests",
]
includes = ["vendor"]
excludes = [
    "playground/**",
    "libs/yii-dev-panel/**",
    "var/**",
    "cache/**",
    "runtime/**",
]
extensions = ["php"]

[formatter]
preset = "default"

[analyzer]
baseline = "mago-analyze-baseline.php"

[linter]
baseline = "mago-lint-baseline.php"

[linter.rules]
# Disable noisy rules that don't add value for this codebase
literal-named-argument = { enabled = false }
tagged-todo = { enabled = false }
halstead = { enabled = false }
no-else-clause = { enabled = false }
no-boolean-flag-parameter = { enabled = false }
prefer-arrow-function = { enabled = false }
no-redundant-math = { enabled = false }
no-shorthand-ternary = { enabled = false }
no-multi-assignments = { enabled = false }
single-class-per-file = { enabled = false }
no-nested-ternary = { enabled = false }

# Downgrade to warnings for existing codebase patterns
# Exclude test files (many test methods is expected) and interface proxies (method count dictated by interface)
too-many-methods = { level = "warning", exclude = [
    # Test files — test classes inherently need many test methods
    "libs/Kernel/tests",
    "libs/API/tests",
    "libs/Adapter/Symfony/tests",
    "libs/Adapter/Yii2/tests",
    "libs/Adapter/Laravel/tests",
    "libs/Testing/tests",
    # Interface proxies — method count dictated by the interface they implement
    "libs/Kernel/src/Helper/StreamWrapper/StreamWrapper.php",
    "libs/Kernel/src/Helper/StreamWrapper/StreamWrapperInterface.php",
    "libs/Kernel/src/Collector/LoggerInterfaceProxy.php",
    "libs/Kernel/src/Collector/Stream/FilesystemStreamProxy.php",
    "libs/Kernel/src/Collector/Stream/HttpStreamProxy.php",
    "libs/API/src/Inspector/Test/PHPUnitJSONReporter.php",
    "libs/API/src/ServerSentEventsStream.php",
    "libs/Adapter/Yiisoft/src/Collector/Db/CommandInterfaceProxy.php",
    "libs/Adapter/Yiisoft/src/Collector/Db/ConnectionInterfaceProxy.php",
    "libs/Adapter/Laravel/src/Proxy/LaravelEventDispatcherProxy.php",
    # Trait centralizes passthrough methods from stream wrapper protocol
    "libs/Kernel/src/Collector/Stream/StreamProxyTrait.php",
    # DI registration / service provider classes — method count driven by number of services to register
    "libs/Adapter/Symfony/src/DependencyInjection/AppDevPanelExtension.php",
    "libs/Adapter/Laravel/src/AppDevPanelServiceProvider.php",
    "libs/Adapter/Yii2/src/Module.php",
    # Config value object — getters and withers for each config property
    "libs/Adapter/Yiisoft/src/Proxy/ContainerProxyConfig.php",
    # Recursive tree-walking dumper — method count inherent to object/array/resource type dispatch
    "libs/Kernel/src/Dumper.php",
    "libs/Kernel/src/DumpContext.php",
    # Storage — methods cover read/write/flush/gc lifecycle
    "libs/Kernel/src/Storage/FileStorage.php",
] }
excessive-parameter-list = { level = "warning", exclude = [
    # Test files — test helpers may need many params for setting up test scenarios
    "libs/Kernel/tests",
    "libs/API/tests",
    "libs/Adapter/Symfony/tests",
    "libs/Adapter/Yii2/tests",
    "libs/Adapter/Laravel/tests",
    "libs/Testing/tests",
    # Interface proxies — parameter lists dictated by the interface
    "libs/Adapter/Yiisoft/src/Collector/Db/CommandInterfaceProxy.php",
    # DTOs / value objects — all params are distinct fields of the record
    "libs/Kernel/src/Event/MethodCallRecord.php",
    "libs/Kernel/src/Collector/CacheOperationRecord.php",
    "libs/Kernel/src/Collector/QueryRecord.php",
    "libs/Kernel/src/Collector/MessageRecord.php",
    "libs/Kernel/src/Service/ServiceDescriptor.php",
    "libs/Adapter/Symfony/src/EventSubscriber/HttpSubscriberCollectors.php",
    "libs/Adapter/Laravel/src/Middleware/DebugCollectors.php",
    # Config value object — all params are distinct config fields
    "libs/Adapter/Yiisoft/src/Proxy/ContainerProxyConfig.php",
    # Internal trait method threading context through call stack
    "libs/Adapter/Yiisoft/src/Proxy/ProxyLogTrait.php",
    # Internal recursive methods thread context through call stack
    "libs/Kernel/src/Dumper.php",
    "libs/Kernel/src/DumpContext.php",
] }
cyclomatic-complexity = { level = "warning", threshold = 15, exclude = [
    "libs/Testing/tests",
    # DI registration / service provider classes — complexity driven by conditional service registration
    "libs/Adapter/Symfony/src/DependencyInjection/AppDevPanelExtension.php",
    "libs/Adapter/Laravel/src/AppDevPanelServiceProvider.php",
    "libs/Adapter/Yii2/src/Module.php",
    # Config providers — complexity from introspecting framework internals (events, services, params)
    "libs/Adapter/Symfony/src/Inspector/SymfonyConfigProvider.php",
    "libs/Adapter/Laravel/src/Inspector/LaravelConfigProvider.php",
    "libs/Adapter/Yii2/src/Inspector/Yii2ConfigProvider.php",
    # CLI commands — complexity from multiple subcommands and output formatting
    "libs/Cli/src/Command/DebugQueryCommand.php",
    "libs/Adapter/Yii2/src/Controller/DebugQueryController.php",
    # Container proxy — complexity from multiple proxy creation strategies
    "libs/Adapter/Yiisoft/src/Proxy/ContainerInterfaceProxy.php",
    # Debugger — complexity from startup/shutdown lifecycle with ignore checks
    "libs/Kernel/src/Debugger.php",
    # Recursive tree-walking dumper — complexity inherent to type dispatch
    "libs/Kernel/src/Dumper.php",
    "libs/Kernel/src/DumpContext.php",
    # Storage — complexity from GC locking and file operations
    "libs/Kernel/src/Storage/FileStorage.php",
    # Stream proxy — complexity from HTTP context extraction
    "libs/Kernel/src/Collector/Stream/HttpStreamProxy.php",
] }
kan-defect = { level = "warning", exclude = [
    "libs/Testing/tests",
    # DI registration / service provider classes — high kan defect from conditional wiring
    "libs/Adapter/Symfony/src/DependencyInjection/AppDevPanelExtension.php",
    "libs/Adapter/Laravel/src/AppDevPanelServiceProvider.php",
    "libs/Adapter/Yii2/src/Module.php",
    # Config providers — high defect score from framework introspection logic
    "libs/Adapter/Symfony/src/Inspector/SymfonyConfigProvider.php",
    "libs/Adapter/Laravel/src/Inspector/LaravelConfigProvider.php",
    "libs/Adapter/Yii2/src/Inspector/Yii2ConfigProvider.php",
    # CLI commands — high defect score from multiple subcommands
    "libs/Cli/src/Command/DebugQueryCommand.php",
    "libs/Adapter/Yii2/src/Controller/DebugQueryController.php",
    # Debugger — kan defect from startup lifecycle branching
    "libs/Kernel/src/Debugger.php",
    # Recursive tree-walking dumper
    "libs/Kernel/src/Dumper.php",
    "libs/Kernel/src/DumpContext.php",
] }
too-many-properties = { level = "error", exclude = [
    # Yii 2 module — properties are public config fields set by framework from config arrays
    "libs/Adapter/Yii2/src/Module.php",
] }
no-error-control-operator = { level = "warning" }
no-empty = { level = "warning" }
no-isset = { level = "warning" }
no-empty-catch-clause = { level = "warning" }
no-literal-password = { exclude = ["libs/Adapter/Symfony/tests"] }
no-debug-symbols = { exclude = ["libs/API/src/Inspector/Controller/InspectController.php"] }
require-preg-quote-delimiter = { level = "warning" }
strict-behavior = { level = "warning" }
