security:
    providers:
        in_memory:
            memory:
                users:
                    admin@example.com:
                        password: '$2y$13$dummy_hash_for_testing_only'
                        roles: ['ROLE_ADMIN', 'ROLE_USER']
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: in_memory
            # http_basic is registered to satisfy Security::login() which requires at
            # least one authenticator on the firewall when called programmatically.
            # The fixture endpoint never sends Basic credentials — login() bypasses the
            # authenticator's challenge and goes straight through TokenStorage.
            http_basic:
                realm: Secured Area
    access_control: []
    role_hierarchy:
        ROLE_ADMIN: [ROLE_USER]
