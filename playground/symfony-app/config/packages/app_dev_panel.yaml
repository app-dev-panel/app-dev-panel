# ADP (Application Development Panel) configuration
app_dev_panel:
    enabled: true
    storage:
        path: '%kernel.project_dir%/var/debug'
        history_size: 50
    collectors:
        request: true
        exception: true
        log: true
        event: true
        service: true
        http_client: true
        timeline: true
        var_dumper: true
        filesystem_stream: true
        http_stream: true
        command: true
        doctrine: true
        twig: false           # Enable when twig/twig is installed
        security: true
        cache: true
        mailer: true
        queue: true
        validator: true
        router: true
    ignored_requests:
        - '/_wdt/**'
        - '/_profiler/**'
        - '/debug/**'
        - '/inspect/**'
    ignored_commands:
        - 'completion'
        - 'help'
        - 'list'
        - 'debug:*'
        - 'cache:*'
