services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'
            - '../src/Controller/TestFixtures/TestFixtureEvent.php'

    App\Controller\:
        resource: '../src/Controller/'
        exclude:
            - '../src/Controller/TestFixtures/TestFixtureEvent.php'
        tags: ['controller.service_arguments']
