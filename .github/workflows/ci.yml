name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  tests:
    name: Tests (PHP ${{ matrix.php }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        php: ['8.4', '8.5']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, sockets
          coverage: pcov
          tools: composer:v2
        env:
          COMPOSER_ALLOW_SUPERUSER: 1

      - name: Get Composer cache directory
        id: composer-cache
        shell: bash
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-php-${{ matrix.php }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run tests
        run: composer test:unit

      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.php == '8.4'
        run: composer test:coverage

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.php == '8.4'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  mago:
    name: Mago (${{ matrix.check }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [format, lint, analyze]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring
          coverage: none
          tools: composer:v2
        env:
          COMPOSER_ALLOW_SUPERUSER: 1

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Setup Mago
        uses: nhedger/setup-mago@v1

      - name: Run format check
        if: matrix.check == 'format'
        run: mago fmt --check

      - name: Run linter
        if: matrix.check == 'lint'
        run: mago lint --reporting-format=github

      - name: Run analyzer
        if: matrix.check == 'analyze'
        run: mago analyze --reporting-format=github
