name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # PHP Unit Tests (core libs)
  # ---------------------------------------------------------------------------
  tests:
    name: PHP Tests (PHP ${{ matrix.php }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        php: ['8.4', '8.5']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, sockets
          coverage: pcov
          tools: composer:v2
        env:
          COMPOSER_ALLOW_SUPERUSER: 1

      - name: Get Composer cache directory
        id: composer-cache
        shell: bash
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-php-${{ matrix.php }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run tests
        run: composer test:unit

      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.php == '8.4'
        run: composer test:coverage

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.php == '8.4'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Frontend Tests (Vitest unit + component tests)
  # ---------------------------------------------------------------------------
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'
          cache-dependency-path: libs/frontend/package-lock.json

      - name: Install dependencies
        working-directory: libs/frontend
        run: npm ci

      - name: Run unit tests
        working-directory: libs/frontend
        run: npm test

  # ---------------------------------------------------------------------------
  # Mago — Core libs (format, lint, analyze)
  # ---------------------------------------------------------------------------
  mago:
    name: "Mago: Core (${{ matrix.check }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [format, lint, analyze]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring
          coverage: none
          tools: composer:v2
        env:
          COMPOSER_ALLOW_SUPERUSER: 1

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Setup Mago
        uses: nhedger/setup-mago@v1

      - name: Run format check
        if: matrix.check == 'format'
        run: mago fmt --check

      - name: Run linter
        if: matrix.check == 'lint'
        run: mago lint --reporting-format=github

      - name: Run analyzer
        if: matrix.check == 'analyze'
        run: mago analyze --reporting-format=github

  # ---------------------------------------------------------------------------
  # Mago — Playgrounds (format, lint, analyze for each playground)
  # ---------------------------------------------------------------------------
  mago-playgrounds:
    name: "Mago: ${{ matrix.playground }} (${{ matrix.check }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        playground:
          - { name: "Yii3",  path: "playground/yii3-app" }
          - { name: "Symfony", path: "playground/symfony-app" }
          - { name: "Yii2",    path: "playground/yii2-basic-app" }
          - { name: "Laravel", path: "playground/laravel-app" }
        check: [format, lint, analyze]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Mago
        uses: nhedger/setup-mago@v1

      - name: Run format check
        if: matrix.check == 'format'
        working-directory: ${{ matrix.playground.path }}
        run: mago fmt --check

      - name: Run linter
        if: matrix.check == 'lint'
        working-directory: ${{ matrix.playground.path }}
        run: mago lint --reporting-format=github

      - name: Run analyzer
        if: matrix.check == 'analyze'
        working-directory: ${{ matrix.playground.path }}
        run: mago analyze --reporting-format=github

  # ---------------------------------------------------------------------------
  # Frontend Code Quality (Prettier + ESLint)
  # ---------------------------------------------------------------------------
  frontend-quality:
    name: "Frontend: Quality"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'
          cache-dependency-path: libs/frontend/package-lock.json

      - name: Install dependencies
        working-directory: libs/frontend
        run: npm ci

      - name: Check formatting (Prettier)
        working-directory: libs/frontend
        run: npm run format:check

      - name: Lint (ESLint)
        working-directory: libs/frontend
        run: npm run lint
