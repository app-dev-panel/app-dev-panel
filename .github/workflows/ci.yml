name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # PHP Unit Tests (core libs)
  # ---------------------------------------------------------------------------
  tests:
    name: PHP Tests (PHP ${{ matrix.php }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        php: ['8.4', '8.5']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, sockets, zip, redis, pcov
          coverage: pcov
          tools: composer:v2
        env:
          COMPOSER_ALLOW_SUPERUSER: 1

      - name: Get Composer cache directory
        id: composer-cache
        shell: bash
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-php-${{ matrix.php }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run tests
        run: php vendor/bin/phpunit --testsuite Kernel,API,Cli,McpServer,Adapter-Symfony,Adapter-Yii3,Adapter-Laravel,Adapter-Yii2,Adapter-Cycle --enforce-time-limit --default-time-limit=30
        timeout-minutes: 10

      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.php == '8.4'
        run: composer test:coverage

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.php == '8.4'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Frontend Install (shared dependency installation)
  # ---------------------------------------------------------------------------
  frontend-install:
    name: "Frontend: Install"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: libs/frontend/package-lock.json

      - name: Install dependencies
        working-directory: libs/frontend
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: libs/frontend/node_modules
          key: frontend-node-modules-${{ hashFiles('libs/frontend/package-lock.json') }}

  # ---------------------------------------------------------------------------
  # Frontend Unit Tests (Vitest)
  # ---------------------------------------------------------------------------
  frontend-tests:
    name: "Frontend: Unit Tests"
    needs: frontend-install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: libs/frontend/node_modules
          key: frontend-node-modules-${{ hashFiles('libs/frontend/package-lock.json') }}

      - name: Run unit tests
        working-directory: libs/frontend
        run: npm test

  # ---------------------------------------------------------------------------
  # Frontend E2E Tests (Vitest + Playwright browser tests)
  # ---------------------------------------------------------------------------
  frontend-e2e:
    name: "Frontend: E2E Tests"
    needs: frontend-install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: libs/frontend/node_modules
          key: frontend-node-modules-${{ hashFiles('libs/frontend/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: libs/frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: libs/frontend
        run: npm run test:e2e

  # ---------------------------------------------------------------------------
  # Mago — Core libs (format, lint, analyze)
  # ---------------------------------------------------------------------------
  mago:
    name: "Mago: Core (${{ matrix.check }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [format, lint, analyze]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring
          coverage: none
          tools: composer:v2
        env:
          COMPOSER_ALLOW_SUPERUSER: 1

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Setup Mago
        uses: nhedger/setup-mago@v1

      - name: Run format check
        if: matrix.check == 'format'
        run: mago fmt --check 2>&1 | tee /tmp/mago-format.txt

      - name: Run linter
        if: matrix.check == 'lint'
        run: mago lint --reporting-format=github 2>&1 | tee /tmp/mago-lint.txt

      - name: Run analyzer
        if: matrix.check == 'analyze'
        run: mago analyze --reporting-format=github 2>&1 | tee /tmp/mago-analyze.txt

      - name: Upload Mago output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mago-${{ matrix.check }}
          path: /tmp/mago-${{ matrix.check }}.txt
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Mago — Playgrounds (format, lint, analyze for each playground)
  # ---------------------------------------------------------------------------
  mago-playgrounds:
    name: "Mago: ${{ matrix.playground.name }} (${{ matrix.check }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        playground:
          - { name: "Yii3",  path: "playground/yii3-app" }
          - { name: "Symfony", path: "playground/symfony-app" }
          - { name: "Yii2",    path: "playground/yii2-basic-app" }
          - { name: "Laravel", path: "playground/laravel-app" }
        check: [format, lint, analyze]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Mago
        uses: nhedger/setup-mago@v1

      - name: Run format check
        if: matrix.check == 'format'
        working-directory: ${{ matrix.playground.path }}
        run: mago fmt --check 2>&1 | tee /tmp/mago-playground-${{ matrix.playground.name }}-${{ matrix.check }}.txt

      - name: Run linter
        if: matrix.check == 'lint'
        working-directory: ${{ matrix.playground.path }}
        run: mago lint --reporting-format=github 2>&1 | tee /tmp/mago-playground-${{ matrix.playground.name }}-${{ matrix.check }}.txt

      - name: Run analyzer
        if: matrix.check == 'analyze'
        working-directory: ${{ matrix.playground.path }}
        run: mago analyze --reporting-format=github 2>&1 | tee /tmp/mago-playground-${{ matrix.playground.name }}-${{ matrix.check }}.txt

      - name: Upload Mago output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mago-playground-${{ matrix.playground.name }}-${{ matrix.check }}
          path: /tmp/mago-playground-${{ matrix.playground.name }}-${{ matrix.check }}.txt
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Frontend Code Quality (Prettier + ESLint)
  # ---------------------------------------------------------------------------
  frontend-quality:
    name: "Frontend: Quality"
    needs: frontend-install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: libs/frontend/node_modules
          key: frontend-node-modules-${{ hashFiles('libs/frontend/package-lock.json') }}

      - name: Check formatting (Prettier)
        working-directory: libs/frontend
        run: npm run format:check

      - name: Lint (ESLint)
        working-directory: libs/frontend
        run: npm run lint
