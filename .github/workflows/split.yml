name: Monorepo Split

on:
  push:
    branches:
      - master
      - '*.x'
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  split:
    name: "Split ${{ matrix.package.name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - { name: "kernel",           local_path: "libs/Kernel",          split_repository: "kernel" }
          - { name: "api",              local_path: "libs/API",             split_repository: "api" }
          - { name: "cli",              local_path: "libs/Cli",             split_repository: "cli" }
          - { name: "mcp-server",       local_path: "libs/McpServer",       split_repository: "mcp-server" }
          - { name: "testing",          local_path: "libs/Testing",         split_repository: "testing" }
          - { name: "adapter-symfony",  local_path: "libs/Adapter/Symfony", split_repository: "adapter-symfony" }
          - { name: "adapter-laravel",  local_path: "libs/Adapter/Laravel", split_repository: "adapter-laravel" }
          - { name: "adapter-yii2",     local_path: "libs/Adapter/Yii2",    split_repository: "adapter-yii2" }
          - { name: "adapter-cycle",    local_path: "libs/Adapter/Cycle",   split_repository: "adapter-cycle" }
          - { name: "adapter-yii3",     local_path: "libs/Adapter/Yii3",    split_repository: "adapter-yii3" }
          - { name: "frontend-assets",  local_path: "libs/FrontendAssets",  split_repository: "frontend-assets", needs_frontend_build: true }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        if: matrix.package.needs_frontend_build
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: libs/frontend/package-lock.json

      - name: Build panel SPA + toolbar into FrontendAssets/dist
        if: matrix.package.needs_frontend_build
        run: |
          cd libs/frontend
          npm ci
          npm run build -w packages/sdk
          npm run build -w packages/panel
          npm run build -w packages/toolbar
          cd ../..
          rm -rf libs/FrontendAssets/dist
          mkdir -p libs/FrontendAssets/dist/toolbar
          cp -R libs/frontend/packages/panel/dist/.   libs/FrontendAssets/dist/
          cp -R libs/frontend/packages/toolbar/dist/. libs/FrontendAssets/dist/toolbar/
          # Force-add the dist to a local commit so splitsh-lite sees it.
          # This commit stays local — it is never pushed back to the monorepo.
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add -f libs/FrontendAssets/dist
          git commit -m "ci: bundle panel SPA + toolbar into FrontendAssets/dist"

      - name: Install splitsh-lite
        env:
          SPLITSH_VERSION: v1.0.1
        run: |
          curl -sLf "https://github.com/splitsh/lite/releases/download/${SPLITSH_VERSION}/lite_linux_amd64.tar.gz" | tar xz
          sudo mv splitsh-lite /usr/local/bin/splitsh-lite
          splitsh-lite --version || echo "splitsh-lite installed (no --version flag)"

      - name: Configure git
        run: |
          git config --local user.name "xepozz"
          git config --local user.email "xepozz@list.ru"

      - name: Split ${{ matrix.package.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.SPLIT_TOKEN }}
          LOCAL_PATH: ${{ matrix.package.local_path }}
          SPLIT_REPO: ${{ matrix.package.split_repository }}
          REF_NAME: ${{ github.ref_name }}
          IS_TAG: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          REMOTE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/app-dev-panel/${SPLIT_REPO}.git"

          echo "Splitting ${LOCAL_PATH} → ${SPLIT_REPO} (ref: ${REF_NAME}, tag: ${IS_TAG})"

          # Run splitsh-lite to extract the subdirectory with full history
          SHA=$(splitsh-lite --prefix="${LOCAL_PATH}")
          echo "Split SHA: ${SHA}"

          # Add split remote
          git remote add split "${REMOTE_URL}" 2>/dev/null || true

          if [ "${IS_TAG}" = "true" ]; then
            # For tags: push the split commit to master and create the tag
            git push split "${SHA}:refs/heads/master" --force
            git push split "${SHA}:refs/tags/${REF_NAME}" --force
          else
            # For branches: push the split commit to the same branch
            git push split "${SHA}:refs/heads/${REF_NAME}" --force
          fi
