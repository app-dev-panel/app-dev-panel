name: Monorepo Split

on:
  push:
    branches:
      - master
    tags:
      - '*'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  split:
    name: "Split ${{ matrix.package.name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - { name: "kernel",           local_path: "libs/Kernel",          split_repository: "kernel" }
          - { name: "api",              local_path: "libs/API",             split_repository: "api" }
          - { name: "cli",              local_path: "libs/Cli",             split_repository: "cli" }
          - { name: "mcp-server",       local_path: "libs/McpServer",       split_repository: "mcp-server" }
          - { name: "testing",          local_path: "libs/Testing",         split_repository: "testing" }
          - { name: "adapter-symfony",  local_path: "libs/Adapter/Symfony", split_repository: "adapter-symfony" }
          - { name: "adapter-laravel",  local_path: "libs/Adapter/Laravel", split_repository: "adapter-laravel" }
          - { name: "adapter-yii2",     local_path: "libs/Adapter/Yii2",    split_repository: "adapter-yii2" }
          - { name: "adapter-cycle",    local_path: "libs/Adapter/Cycle",   split_repository: "adapter-cycle" }
          - { name: "adapter-yiisoft",  local_path: "libs/Adapter/Yiisoft", split_repository: "adapter-yiisoft" }

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Split ${{ matrix.package.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.SPLIT_TOKEN }}
        run: |
          set -euo pipefail

          PACKAGE_DIR="${{ matrix.package.local_path }}"
          REMOTE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/app-dev-panel/${{ matrix.package.split_repository }}.git"
          BRANCH="master"

          # Extract subtree
          SHA=$(git subtree split --prefix="$PACKAGE_DIR" HEAD)
          echo "Subtree SHA: $SHA"

          # Clone target repo
          CLONE_DIR=$(mktemp -d)
          git clone --bare "$REMOTE_URL" "$CLONE_DIR" 2>/dev/null || git init --bare "$CLONE_DIR"

          # Push subtree to target
          git push "$REMOTE_URL" "$SHA:refs/heads/$BRANCH" --force
          echo "✅ Pushed $BRANCH to ${{ matrix.package.split_repository }}"

          # Push tag if this is a tag event
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
            # Create a lightweight tag on the split SHA
            GIT_DIR="$CLONE_DIR" git tag "$TAG" "$SHA" 2>/dev/null || true
            git push "$REMOTE_URL" "$SHA:refs/tags/$TAG" --force
            echo "✅ Pushed tag $TAG to ${{ matrix.package.split_repository }}"
          fi

          rm -rf "$CLONE_DIR"
